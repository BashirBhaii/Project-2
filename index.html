<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dry Fruits Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🥜 Premium Dry Fruits Store </h1>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

<div class="cart">
🛒 Cart: <span id="cart-count">0</span>
</div>

</header>

<section class="search-section">

<input type="text" id="search" placeholder="Search Dry Fruits...">

</section>


<section class="products" id="product-list">

<div class="card" data-name="almonds">
<img src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32">
<h3>Almonds</h3>
<p>$10 / kg</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

<div class="card" data-name="cashew">
<img src="https://images.unsplash.com/photo-1615484477201-9c89c0b91d3a">
<h3>Cashew Nuts</h3>
<p>$15 / kg</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

<div class="card" data-name="pistachio">
<img src="https://images.unsplash.com/photo-1604908177522-432f1b7d7c60">
<h3>Pistachios</h3>
<p>$20 / kg</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

<div class="card" data-name="walnut">
<img src="https://images.unsplash.com/photo-1615485291234-2c52ffb62a1c">
<h3>Walnuts</h3>
<p>$18 / kg</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

</section>

<footer>

<p>© 2026 Dry Fruits Store | Healthy Life</p>

</footer>

<script src="script.js"></script>

</body>
</html>
